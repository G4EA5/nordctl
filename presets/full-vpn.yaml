# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: full-vpn
label: Full VPN
category: Connect
summary: Standard VPN connect, Meshnet on, router DNS restored
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: nordvpn_connect
  - action: nordvpn_set
    key: autoconnect
    value: "on"
