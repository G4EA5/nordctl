# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: privacy-complete
label: Privacy complete
category: Privacy
summary: Kill switch, firewall, Nord DNS, Threat Protection, analytics off
steps:
  - action: network_restore_dns
  - action: nordvpn_settings
    settings:
      killswitch: "on"
      firewall: "on"
      dns: "on"
      threatprotectionlite: "on"
      analytics: "off"
      meshnet: "on"
      routing: "on"
      lan-discovery: "off"
  - action: nordvpn_connect
