# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: meshnet-peer
label: Route via Meshnet peer
category: Meshnet
summary: Use a peer device as VPN exit (mesh_peer in config)
requires:
  - mesh_peer
steps:
  - action: nordvpn_disconnect
  - action: nordvpn_settings
    settings:
      meshnet: "on"
      routing: "on"
  - action: meshnet_peer_connect
