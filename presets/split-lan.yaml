# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: split-lan
label: Split tunnel (LAN)
category: Split tunnel
summary: VPN on while allowlisting your home LAN subnet
requires:
  - lan_allowlist_cidr
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: allowlist_subnet
    cidr: "{lan_allowlist_cidr}"
  - action: nordvpn_connect
