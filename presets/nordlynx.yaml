# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: nordlynx
label: NordLynx (WireGuard)
category: Technology
summary: Use NordLynx technology and connect
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: technology
    value: NORDLYNX
  - action: nordvpn_settings
    settings:
      meshnet: "on"
      routing: "on"
      lan-discovery: "on"
  - action: nordvpn_connect
