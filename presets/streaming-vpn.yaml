# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: streaming-vpn
label: TV streaming (VPN)
category: Streaming
summary: Connect via VPN using connect_country from config, restore router DNS
requires:
  - connect_country
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: nordvpn_connect
    target: "{connect_country}"
  - action: nordvpn_set
    key: autoconnect
    value: "on"
    extra: "{connect_country}"
