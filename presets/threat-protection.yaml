# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: threat-protection
label: Threat Protection
category: Privacy
summary: Block suspicious sites (Threat Protection Lite) and connect
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: threatprotectionlite
    value: "on"
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: nordvpn_connect
