# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: latam-public
label: LATAM public WiFi
category: Regional
region: americas
summary: Kill switch and firewall on untrusted networks — connect using connect_country
requires:
  - connect_country
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: killswitch
    value: "on"
  - action: nordvpn_set
    key: firewall
    value: "on"
  - action: nordvpn_connect
    target: "{connect_country}"
