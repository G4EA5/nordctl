# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: onion-over-vpn
label: Onion over VPN
category: Server groups
summary: Connect via NordVPN then Tor (Onion Over VPN group)
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: meshnet
    value: "off"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: nordvpn_connect
    group: Onion_Over_VPN
