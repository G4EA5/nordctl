# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: meshnet-disabled
label: VPN without Meshnet
category: Meshnet
summary: Full VPN with Meshnet turned off
steps:
  - action: network_restore_dns
  - action: nordvpn_settings
    settings:
      meshnet: "off"
      routing: "on"
      lan-discovery: "on"
  - action: nordvpn_connect
