# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: privacy-max
label: Privacy max
category: Privacy
summary: Kill switch and firewall on, Nord DNS enabled
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: killswitch
    value: "on"
  - action: nordvpn_set
    key: firewall
    value: "on"
  - action: nordvpn_set
    key: dns
    value: "on"
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_connect
