# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: streaming-smartdns
label: TV streaming (Smart DNS)
category: Streaming
summary: VPN off, Nord Smart DNS on WiFi, Meshnet stays on
steps:
  - action: nordvpn_disconnect
  - action: nordvpn_set
    key: autoconnect
    value: "off"
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: network_smart_dns
