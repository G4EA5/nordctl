# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: nord-dns
label: VPN + Nord DNS
category: DNS
summary: Force Nord DNS on while connected (helps reduce DNS leaks)
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: dns
    value: "on"
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: nordvpn_connect
