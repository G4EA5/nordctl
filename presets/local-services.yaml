# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: local-services
label: Local services (no VPN)
category: Meshnet
summary: VPN off and router DNS — for banking apps, local portals, or geo checks
steps:
  - action: nordvpn_disconnect
  - action: nordvpn_set
    key: autoconnect
    value: "off"
  - action: nordvpn_set
    key: killswitch
    value: "off"
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: lan-discovery
    value: "on"
  - action: network_restore_dns
