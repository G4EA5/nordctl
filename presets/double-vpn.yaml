# nordctl-src-id:NCTL-src-a7f3c912-6e4b-5d8a
id: double-vpn
label: Double VPN
category: Server groups
summary: Route through two VPN hops (slower, higher privacy)
steps:
  - action: network_restore_dns
  - action: nordvpn_set
    key: meshnet
    value: "on"
  - action: nordvpn_set
    key: routing
    value: "on"
  - action: nordvpn_connect
    group: Double_VPN
